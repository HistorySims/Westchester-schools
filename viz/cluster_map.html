<!--
  Westchester Schools — Topic Map renderer.

  Self-contained (no external libs — CSP-safe). Reads the herald-cluster export
  from the #map-data script tag. Canvas 2D **bubble map**: one disk per topic
  (radius ∝ passage count), positioned by a cosine UMAP of the topic centroids,
  colored by theme or by dominant district. Pan / zoom / pinch; the legend is a
  drill-down tree (theme → topic → leaf, from the export's `hierarchy`) — tap to
  open a branch, which isolates and frames it on the map; filter by district;
  tap a bubble for its detail. Written as Artifact body (the host wraps it in
  <!doctype><head><body>); the __MAP_DATA__ token is replaced at publish time.
-->
<style>
  :root {
    --bg: #0d1117; --panel: #161b22cc; --panel-solid: #161b22; --panel-2: #1c232c;
    --line: #2a3441; --ink: #e6edf3; --muted: #8b97a6; --faint: #5b6675;
    --accent: #d8a24a; --accent-ink: #1a1204;
    --shadow: 0 8px 30px -8px #000a;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
    --ui: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f7f9; --panel: #ffffffe6; --panel-solid: #ffffff; --panel-2: #eef1f4;
      --line: #d9dee5; --ink: #1a2029; --muted: #5b6675; --faint: #98a2b0;
      --accent: #b0761a; --accent-ink: #fff; --shadow: 0 8px 30px -10px #0002;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0d1117; --panel: #161b22cc; --panel-solid: #161b22; --panel-2: #1c232c;
    --line: #2a3441; --ink: #e6edf3; --muted: #8b97a6; --faint: #5b6675;
    --accent: #d8a24a; --accent-ink: #1a1204; --shadow: 0 8px 30px -8px #000a;
  }
  :root[data-theme="light"] {
    --bg: #f6f7f9; --panel: #ffffffe6; --panel-solid: #ffffff; --panel-2: #eef1f4;
    --line: #d9dee5; --ink: #1a2029; --muted: #5b6675; --faint: #98a2b0;
    --accent: #b0761a; --accent-ink: #fff; --shadow: 0 8px 30px -10px #0002;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--ui);
    overflow: hidden; -webkit-tap-highlight-color: transparent;
  }
  #app { position: fixed; inset: 0; display: grid; grid-template-columns: 300px 1fr; }
  #stage { position: relative; overflow: hidden; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block;
    touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }

  /* ---- rail ---- */
  #rail {
    display: flex; flex-direction: column; min-height: 0;
    background: var(--panel-solid); border-right: 1px solid var(--line);
  }
  .head { padding: 16px 16px 12px; border-bottom: 1px solid var(--line); }
  .kicker { font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent); font-weight: 600; }
  h1 { font-size: 16px; margin: 3px 0 0; letter-spacing: -.01em; line-height: 1.25;
    text-wrap: balance; }
  .stat { margin-top: 8px; font-family: var(--mono); font-size: 11.5px;
    color: var(--muted); font-variant-numeric: tabular-nums; }
  .stat b { color: var(--ink); font-weight: 600; }

  .controls { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px;
    border-bottom: 1px solid var(--line); }
  .label { font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--faint); margin-bottom: 7px; font-weight: 600; }

  .seg { display: flex; background: var(--panel-2); border-radius: 8px; padding: 3px;
    gap: 3px; }
  .seg button { flex: 1; border: 0; background: transparent; color: var(--muted);
    font: inherit; font-size: 12.5px; padding: 6px 8px; border-radius: 6px;
    cursor: pointer; }
  .seg button[aria-pressed="true"] { background: var(--accent); color: var(--accent-ink);
    font-weight: 600; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { border: 1px solid var(--line); background: transparent; color: var(--muted);
    font: inherit; font-size: 11.5px; padding: 4px 9px; border-radius: 999px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .chip[aria-pressed="true"] { border-color: var(--accent); color: var(--ink);
    background: color-mix(in srgb, var(--accent) 14%, transparent); }
  .chip .dot { width: 8px; height: 8px; border-radius: 2px; }

  .topics { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .search { margin: 12px 16px 8px; }
  .search input { width: 100%; background: var(--panel-2); border: 1px solid var(--line);
    color: var(--ink); font: inherit; font-size: 12.5px; padding: 8px 10px;
    border-radius: 8px; }
  .search input::placeholder { color: var(--faint); }
  .list { overflow-y: auto; padding: 0 8px 12px; }
  .topic { display: grid; grid-template-columns: 10px 1fr auto; align-items: center;
    gap: 9px; padding: 7px 8px; border-radius: 7px; cursor: pointer; border: 0;
    background: transparent; width: 100%; text-align: left; color: var(--ink);
    font: inherit; }
  .topic:hover { background: var(--panel-2); }
  .topic[aria-pressed="true"] { background: color-mix(in srgb, var(--accent) 16%, transparent); }
  .topic .swatch { width: 10px; height: 10px; border-radius: 3px; }
  .topic .name { font-size: 12.5px; line-height: 1.3; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .topic .n { font-family: var(--mono); font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums; }
  .topic .tw { width: 10px; height: 10px; display: inline-flex; align-items: center;
    justify-content: center; color: var(--faint); font-size: 9px; transition: transform .12s; }
  .topic.open > .tw { transform: rotate(90deg); }
  .topic.group .name { font-weight: 600; }
  .topic.lvl0 .name { font-size: 13px; }
  .topic.lvl1 .name { color: var(--muted); }
  .topic.leaf .name { font-size: 12px; }
  .foot { padding: 10px 16px; border-top: 1px solid var(--line); font-size: 11px;
    color: var(--faint); display: flex; justify-content: space-between; align-items: center; }
  .foot button { border: 1px solid var(--line); background: transparent; color: var(--muted);
    font: inherit; font-size: 11px; padding: 4px 9px; border-radius: 6px; cursor: pointer; }

  /* ---- tooltip ---- */
  #tip { position: absolute; pointer-events: none; z-index: 5; max-width: 260px;
    background: var(--panel-solid); border: 1px solid var(--line); border-radius: 9px;
    box-shadow: var(--shadow); padding: 9px 11px; font-size: 12px; opacity: 0;
    transition: opacity .1s; transform: translate(-50%, calc(-100% - 12px)); }
  #tip.on { opacity: 1; }
  #tip .t-top { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
  #tip .t-swatch { width: 9px; height: 9px; border-radius: 2px; flex: none; }
  #tip .t-topic { font-weight: 600; font-size: 12px; }
  #tip .t-meta { font-family: var(--mono); font-size: 10.5px; color: var(--muted);
    letter-spacing: .01em; }
  #tip .t-body { color: var(--ink); margin-top: 4px; line-height: 1.35; }

  /* floating controls on desktop stage */
  .stage-btns { position: absolute; top: 12px; right: 12px; z-index: 4; display: flex;
    gap: 6px; }
  .stage-btns button { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--panel); backdrop-filter: blur(6px); color: var(--ink); cursor: pointer;
    font-size: 16px; line-height: 1; }

  /* mobile sheet trigger */
  #sheetBtn { display: none; }

  @media (max-width: 720px) {
    #app { grid-template-columns: 1fr; }
    #rail {
      position: fixed; left: 0; right: 0; bottom: 0; top: auto; z-index: 10;
      max-height: 72vh; border-right: 0; border-top: 1px solid var(--line);
      border-radius: 16px 16px 0 0; box-shadow: var(--shadow);
      transform: translateY(calc(100% - 52px)); transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    #rail.open { transform: translateY(0); }
    .head { cursor: pointer; padding-top: 14px; }
    .head::before { content: ""; position: absolute; top: 7px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 4px; border-radius: 3px; background: var(--line); }
    #rail { padding-top: 6px; }
  }
</style>

<div id="app">
  <aside id="rail" aria-label="Map controls">
    <header class="head" id="head">
      <div class="kicker">Westchester Schools</div>
      <h1>Topic Map</h1>
      <div class="stat" id="stat">—</div>
    </header>

    <div class="controls">
      <div>
        <div class="label">Color by</div>
        <div class="seg" role="group" aria-label="Color mode">
          <button id="byTopic" aria-pressed="true">Topic</button>
          <button id="byDistrict" aria-pressed="false">District</button>
        </div>
      </div>
      <div>
        <div class="label">Districts</div>
        <div class="chips" id="chips"></div>
      </div>
    </div>

    <div class="topics">
      <div class="search"><input id="search" type="search" placeholder="Search topics…"
        autocomplete="off" /></div>
      <div class="list" id="list"></div>
    </div>

    <div class="foot">
      <span id="footNote">Tap a topic to isolate it</span>
      <button id="reset">Reset view</button>
    </div>
  </aside>

  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="stage-btns">
      <button id="zin" title="Zoom in">+</button>
      <button id="zout" title="Zoom out">−</button>
    </div>
    <div id="tip"></div>
  </div>
</div>

<script id="map-data" type="application/json">__MAP_DATA__</script>
<script>
(function () {
  "use strict";
  const DATA = JSON.parse(document.getElementById("map-data").textContent);
  const N = DATA.n_points;
  const BUB = DATA.clusters;                 // one object per topic (bubble)
  const DISTRICTS = DATA.districts;
  const HAS_TREE = !!(DATA.hierarchy && DATA.hierarchy.length);
  const N_THEMES = HAS_TREE ? DATA.hierarchy[0].clusters.length : 0;

  // ---- colors ------------------------------------------------------------
  const DIST_HUES = [4, 32, 45, 130, 190, 210, 265, 320];
  const dark = () => {
    const t = document.documentElement.getAttribute("data-theme");
    if (t) return t === "dark";
    return matchMedia("(prefers-color-scheme: dark)").matches;
  };
  // theme hue: evenly spaced around the wheel (themes are few, keep them apart)
  function themeColor(tid, a) {
    if (tid < 0) return dark() ? `hsla(220 8% 60% / ${a})` : `hsla(220 10% 55% / ${a})`;
    const h = N_THEMES ? (tid * 360 / N_THEMES) : (tid * 137.508) % 360;
    return dark() ? `hsla(${h} 65% 62% / ${a})` : `hsla(${h} 60% 47% / ${a})`;
  }
  function distColor(di, a) {
    const h = DIST_HUES[di % DIST_HUES.length];
    return dark() ? `hsla(${h} 62% 62% / ${a})` : `hsla(${h} 58% 46% / ${a})`;
  }
  const leafById = {}; BUB.forEach(c => leafById[c.id] = c);
  function domDistrict(c) {            // dominant district index for a bubble
    let bi = 0, bv = -1;
    for (let d = 0; d < c.dist.length; d++) if (c.dist[d] > bv) { bv = c.dist[d]; bi = d; }
    return bi;
  }
  function bubbleColor(c, a) {
    return mode === "district" ? distColor(domDistrict(c), a) : themeColor(c.theme, a);
  }

  // ---- topic hierarchy tree (drives the legend + isolation) --------------
  let uid = 0;
  function leafNode(c) {
    return { key: ++uid, kind: "leaf", cid: c.id, label: c.label, size: c.size,
             theme: c.theme, leaves: new Set([c.id]), children: null };
  }
  function buildRoots() {
    const H = DATA.hierarchy;
    if (!H || !H.length) return BUB.slice().sort((a,b)=>b.size-a.size).map(leafNode);
    const tiers = H.map((tier, lvl) => tier.clusters.map(g => ({
      key: ++uid, kind: "group", lvl, gid: g.id, label: g.label, size: g.size,
      leaves: new Set(g.leaves), first: g.leaves[0], children: null, _leaves: g.leaves,
    })));
    for (let i = 0; i < tiers.length; i++) {
      for (const g of tiers[i]) {
        const kids = (i + 1 < tiers.length)
          ? tiers[i + 1].filter(h => g.leaves.has(h.first))
          : g._leaves.map(id => leafNode(leafById[id] || { id, label: "Topic " + id, size: 0, theme: -1 }));
        g.children = kids.sort((a, b) => b.size - a.size);
      }
    }
    return tiers[0].slice().sort((a, b) => b.size - a.size);
  }
  const ROOTS = buildRoots();
  // theme id for a leaf (for its legend swatch), even without explicit field
  function leafTheme(cid) { const c = leafById[cid]; return c ? c.theme : -1; }

  // ---- state -------------------------------------------------------------
  let mode = "theme";                        // "theme" | "district"
  const distOn = DISTRICTS.map(() => true);
  let sel = null;                            // { key, label, leaves:Set<cid> } | null
  const open = new Set();                    // expanded group node keys

  const maxSize = Math.max(1, ...BUB.map(c => c.size));
  const RMIN = 0.006, RK = 0.055;            // world-space radius (data in [0,1])
  function worldR(c) { return RMIN + RK * Math.sqrt(c.size / maxSize); }
  function active(c) {                       // passes the district filter?
    if (distOn.every(Boolean)) return true;
    for (let d = 0; d < c.dist.length; d++) if (distOn[d] && c.dist[d] > 0) return true;
    return false;
  }
  const drawOrder = BUB.map((c, i) => i).sort((a, b) => BUB[b].size - BUB[a].size);

  // ---- canvas + transform ------------------------------------------------
  const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
  let W = 0, H = 0, DPR = 1;
  const view = { k: 1, tx: 0, ty: 0 };
  function resize() {
    DPR = Math.min(devicePixelRatio || 1, 2);
    const r = cv.getBoundingClientRect(); W = r.width; H = r.height;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    draw();
  }
  function fit() {
    const pad = 34, s = Math.min(W, H) - pad * 2;
    view.k = s; view.tx = (W - s) / 2; view.ty = (H - s) / 2; draw();
  }
  const sx = c => c.x * view.k + view.tx;
  const sy = c => (1 - c.y) * view.k + view.ty;

  let raf = 0;
  function draw() { if (!raf) raf = requestAnimationFrame(render); }
  function render() {
    raf = 0;
    ctx.clearRect(0, 0, W, H);
    const dim = sel !== null;
    ctx.lineWidth = 1;
    const labels = [];
    for (const i of drawOrder) {
      const c = BUB[i];
      const on = (sel === null || sel.leaves.has(c.id)) && active(c);
      const r = Math.max(2.2, worldR(c) * view.k);
      const px = sx(c), py = sy(c);
      if (px < -r || px > W + r || py < -r || py > H + r) continue;   // cull
      const a = on ? 0.72 : (dim ? 0.06 : 0.14);
      ctx.beginPath(); ctx.arc(px, py, r, 0, 6.2832);
      ctx.fillStyle = bubbleColor(c, a); ctx.fill();
      if (on) {
        ctx.strokeStyle = dark() ? "rgba(0,0,0,.35)" : "rgba(255,255,255,.65)";
        ctx.stroke();
        // label only when it won't clutter: a small isolated set, or big & zoomed
        const drilled = sel && sel.leaves.size <= 18;
        if (drilled || r > 44) labels.push([c, px, py, r]);
      }
    }
    // labels last, on top — greedy placement, skip any that would overlap
    ctx.font = "600 11px ui-sans-serif, system-ui, sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const placed = [];
    for (const [c, px, py] of labels) {
      const t = c.label.length > 32 ? c.label.slice(0, 31) + "…" : c.label;
      const w = ctx.measureText(t).width + 8, h = 15;
      const box = [px - w / 2, py - h / 2, px + w / 2, py + h / 2];
      if (placed.some(q => box[0] < q[2] && box[2] > q[0] && box[1] < q[3] && box[3] > q[1])) continue;
      placed.push(box);
      ctx.fillStyle = dark() ? "rgba(12,15,20,.78)" : "rgba(255,255,255,.86)";
      ctx.fillRect(box[0], box[1], w, h);
      ctx.fillStyle = dark() ? "#e8ecf2" : "#1a2028";
      ctx.fillText(t, px, py + 0.5);
    }
  }

  // ---- interaction: pan / zoom / pinch ----------------------------------
  function zoomAt(px, py, factor) {
    const wx = (px - view.tx) / view.k, wy = (py - view.ty) / view.k;
    view.k *= factor;
    view.tx = px - wx * view.k; view.ty = py - wy * view.k; draw();
  }
  cv.addEventListener("wheel", e => {
    e.preventDefault();
    zoomAt(e.offsetX, e.offsetY, Math.exp(-e.deltaY * 0.0016));
  }, { passive: false });

  const pts = new Map();
  let panLast = null, pinchLast = 0, moved = false;
  cv.addEventListener("pointerdown", e => {
    cv.setPointerCapture(e.pointerId);
    pts.set(e.pointerId, { x: e.offsetX, y: e.offsetY });
    if (pts.size === 1) { panLast = { x: e.offsetX, y: e.offsetY }; moved = false; }
    hideTip();
  });
  cv.addEventListener("pointermove", e => {
    if (pts.has(e.pointerId)) pts.set(e.pointerId, { x: e.offsetX, y: e.offsetY });
    if (pts.size === 2) {
      const [a, b] = [...pts.values()];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (pinchLast) zoomAt((a.x + b.x) / 2, (a.y + b.y) / 2, d / pinchLast);
      pinchLast = d; panLast = null; moved = true;
    } else if (pts.size === 1 && panLast) {
      const dx = e.offsetX - panLast.x, dy = e.offsetY - panLast.y;
      if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
      view.tx += dx; view.ty += dy;
      panLast = { x: e.offsetX, y: e.offsetY }; draw();
    } else if (pts.size === 0) {
      hover(e.offsetX, e.offsetY);
    }
  });
  function endPtr(e) {
    const wasTap = pts.size === 1 && !moved;
    const p = pts.get(e.pointerId);
    pts.delete(e.pointerId);
    if (pts.size < 2) pinchLast = 0;
    if (pts.size === 1) { const q = [...pts.values()][0]; panLast = { x: q.x, y: q.y }; }
    if (pts.size === 0) panLast = null;
    if (wasTap && p) { const c = nearest(p.x, p.y); if (c) showTip(c, p.x, p.y); else hideTip(); }
  }
  cv.addEventListener("pointerup", endPtr);
  cv.addEventListener("pointercancel", endPtr);
  cv.addEventListener("pointerleave", () => { if (pts.size === 0) hideTip(); });
  document.getElementById("zin").onclick = () => zoomAt(W / 2, H / 2, 1.4);
  document.getElementById("zout").onclick = () => zoomAt(W / 2, H / 2, 1 / 1.4);

  // ---- hit testing + tooltip --------------------------------------------
  const tip = document.getElementById("tip");
  function nearest(px, py) {
    let best = null, bd = Infinity;
    for (const i of drawOrder) {                 // big first; smaller wins ties (drawn on top)
      const c = BUB[i];
      if (sel && !sel.leaves.has(c.id)) continue;
      if (!active(c)) continue;
      const r = Math.max(2.2, worldR(c) * view.k) + 3;
      const dx = sx(c) - px, dy = sy(c) - py, d = dx * dx + dy * dy;
      if (d <= r * r && d < bd) { bd = d; best = c; }
    }
    return best;
  }
  function topDistricts(c) {
    return c.dist.map((n, d) => [n, d]).filter(([n]) => n > 0)
      .sort((a, b) => b[0] - a[0]).slice(0, 3)
      .map(([n, d]) => `${esc(DISTRICTS[d])} ${n}`).join(" · ");
  }
  function showTip(c, px, py) {
    tip.innerHTML =
      `<div class="t-top"><span class="t-swatch" style="background:${bubbleColor(c, 1)}"></span>` +
      `<span class="t-topic">${esc(c.label)}</span></div>` +
      `<div class="t-meta">${c.size} passages · ${topDistricts(c)}</div>` +
      (c.tip ? `<div class="t-body">${esc(c.tip)}</div>` : "");
    tip.style.left = px + "px"; tip.style.top = py + "px"; tip.classList.add("on");
  }
  function hover(px, py) { const c = nearest(px, py); if (c) showTip(c, px, py); else hideTip(); }
  function hideTip() { tip.classList.remove("on"); }
  function esc(s) { return String(s).replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

  // ---- rail: stats, chips, topics ---------------------------------------
  document.getElementById("stat").innerHTML =
    `<b>${N.toLocaleString()}</b> passages · <b>${DATA.n_clusters}</b> topics` +
    (HAS_TREE ? ` in <b>${N_THEMES}</b> themes` : "") +
    (DATA.n_noise ? ` · ${DATA.n_noise.toLocaleString()} unclustered` : "");

  const chipsEl = document.getElementById("chips");
  DISTRICTS.forEach((slug, di) => {
    const b = document.createElement("button");
    b.className = "chip"; b.setAttribute("aria-pressed", "true");
    b.innerHTML = `<span class="dot" style="background:${distColor(di, 1)}"></span>${esc(slug)}`;
    b.onclick = () => { distOn[di] = !distOn[di]; b.setAttribute("aria-pressed", distOn[di]); draw(); };
    chipsEl.appendChild(b);
  });

  const listEl = document.getElementById("list"), searchEl = document.getElementById("search");

  function focusBubbles(node) {
    // pan/zoom to frame the selected leaves
    const ids = node.leaves;
    let minX = 1, maxX = 0, minY = 1, maxY = 0, any = false;
    for (const c of BUB) if (ids.has(c.id)) {
      any = true; minX = Math.min(minX, c.x); maxX = Math.max(maxX, c.x);
      minY = Math.min(minY, c.y); maxY = Math.max(maxY, c.y);
    }
    if (!any) return;
    const pad = 0.08, w = Math.max(maxX - minX + pad * 2, 0.05), h = Math.max(maxY - minY + pad * 2, 0.05);
    const s = Math.min(W, H) * 0.9;
    view.k = s / Math.max(w, h);
    const cxw = (minX + maxX) / 2, cyw = (minY + maxY) / 2;
    view.tx = W / 2 - cxw * view.k; view.ty = H / 2 - (1 - cyw) * view.k; draw();
  }
  function isolate(node) {
    if (sel && sel.key === node.key) sel = null;
    else { sel = { key: node.key, label: node.label, leaves: node.leaves }; focusBubbles(node); }
    syncTopics(); draw();
  }
  function selected(node) { return sel && sel.key === node.key; }

  function leafRow(node, depth) {
    const b = document.createElement("button");
    b.className = "topic leaf"; b.setAttribute("aria-pressed", selected(node));
    b.style.paddingLeft = (8 + depth * 15) + "px";
    b.innerHTML = `<span class="swatch" style="background:${themeColor(node.theme, 1)}"></span>` +
      `<span class="name">${esc(node.label)}</span><span class="n">${node.size}</span>`;
    b.onclick = () => isolate(node);
    return b;
  }
  function groupRow(node, depth) {
    const b = document.createElement("button");
    const isOpen = open.has(node.key);
    b.className = `topic group lvl${node.lvl}` + (isOpen ? " open" : "");
    b.setAttribute("aria-pressed", selected(node));
    b.style.paddingLeft = (8 + depth * 15) + "px";
    const twStyle = node.lvl === 0 ? ` style="color:${themeColor(node.gid, 1)}"` : "";
    b.innerHTML = `<span class="tw"${twStyle}>▶</span>` +
      `<span class="name">${esc(node.label)}</span><span class="n">${node.size}</span>`;
    b.onclick = () => {
      if (isOpen) { open.delete(node.key); if (selected(node)) sel = null; }
      else { open.add(node.key); sel = { key: node.key, label: node.label, leaves: node.leaves }; focusBubbles(node); }
      syncTopics(); draw();
    };
    return b;
  }
  function renderTree(nodes, depth) {
    for (const node of nodes) {
      if (node.kind === "leaf") { listEl.appendChild(leafRow(node, depth)); continue; }
      listEl.appendChild(groupRow(node, depth));
      if (open.has(node.key)) renderTree(node.children, depth + 1);
    }
  }
  function renderFlat(q) {
    const seen = new Set();
    const walk = ns => ns.forEach(n => n.kind === "leaf"
      ? (n.label.toLowerCase().includes(q) && !seen.has(n.cid)
         && (seen.add(n.cid), listEl.appendChild(leafRow(n, 0))))
      : walk(n.children || []));
    walk(ROOTS);
    if (!listEl.children.length)
      listEl.innerHTML = `<div style="padding:10px 12px;color:var(--faint);font-size:12px">No topics match.</div>`;
  }
  function renderList() {
    const q = searchEl.value.trim().toLowerCase();
    listEl.innerHTML = "";
    if (q) renderFlat(q); else renderTree(ROOTS, 0);
  }
  function syncTopics() {
    renderList();
    document.getElementById("footNote").textContent =
      sel === null ? (HAS_TREE ? "Tap a theme to open · tap to isolate" : "Tap a topic to isolate it")
        : `Isolated: ${sel.label}`;
  }
  searchEl.addEventListener("input", renderList);

  // ---- color mode toggle -------------------------------------------------
  const bT = document.getElementById("byTopic"), bD = document.getElementById("byDistrict");
  bT.textContent = "Theme";
  function setMode(m) {
    mode = m; bT.setAttribute("aria-pressed", m === "theme"); bD.setAttribute("aria-pressed", m === "district");
    draw();
  }
  bT.onclick = () => setMode("theme"); bD.onclick = () => setMode("district");

  document.getElementById("reset").onclick = () => { sel = null; open.clear(); syncTopics(); fit(); };

  const rail = document.getElementById("rail");
  document.getElementById("head").addEventListener("click", () => {
    if (matchMedia("(max-width: 720px)").matches) rail.classList.toggle("open");
  });

  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => { renderList(); draw(); });
  new MutationObserver(() => { renderList(); draw(); })
    .observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  window.addEventListener("resize", () => { resize(); });
  resize(); fit(); syncTopics(); draw();
})();
</script>
