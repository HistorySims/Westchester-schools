name: cluster

# Cluster the corpus into a topic map: load chunk embeddings -> UMAP (2D) ->
# HDBSCAN (discovered topics) -> Haiku topic labels -> compact JSON. The JSON
# feeds the interactive cluster map (docs/VIZ.md). Uploaded as an artifact you
# can download; share it back and it renders as a phone-viewable page.
#
#   Actions -> cluster -> Run workflow
#
# Required secrets: SUPABASE_DB_URL, and ANTHROPIC_API_KEY (topic labels;
# skip with the 'label' input off).

on:
  workflow_dispatch:
    inputs:
      sample:
        description: "Random-sample this many chunks (empty = all ~23k)"
        required: false
        type: string
        default: ""
      min_cluster_size:
        description: "HDBSCAN min_cluster_size (larger = fewer, broader topics)"
        type: string
        default: "15"
      embeddings:
        description: "content = re-embed content-only (topic map); stored = district-prefixed vectors"
        type: choice
        options: ["content", "stored"]
        default: "content"
      label:
        description: "Label topics with Haiku (needs ANTHROPIC_API_KEY)"
        type: boolean
        default: true

concurrency:
  group: cluster
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cluster:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync deps
        run: uv sync --frozen
      - name: Sanity-check secrets
        run: |
          [ -n "$SUPABASE_DB_URL" ] || { echo "SUPABASE_DB_URL secret is missing"; exit 1; }
      - name: Cluster
        run: |
          uv run herald-cluster run \
            --out cluster-map.json \
            --min-cluster-size "${{ inputs.min_cluster_size }}" \
            --embeddings "${{ inputs.embeddings }}" \
            ${{ inputs.sample && format('--sample "{0}"', inputs.sample) || '' }} \
            ${{ inputs.label && '--labels' || '--no-labels' }}
      - name: Summarize topics in the run log
        if: always()
        run: |
          if [ -f cluster-map.json ]; then
            uv run python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          d = json.load(open("cluster-map.json"))
          print(f"# Topic map\n\n{d['n_points']} points · {d['n_clusters']} topics · {d['n_noise']} noise\n")
          print("| topic | size |\n|---|---|")
          for c in sorted(d["clusters"], key=lambda c: -c["size"])[:40]:
              print(f"| {c['label']} | {c['size']} |")
          PY
          fi
      - name: Upload topic map
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-map
          path: cluster-map.json
          if-no-files-found: warn
          retention-days: 14
