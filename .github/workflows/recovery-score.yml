name: Quarantine recovery scoring

# Phase A of the Quarantine Recovery System — free signals only:
# gazetteer, fragments, fuzzy entity matches (pg_trgm + OCR damage
# variants), layout grid, footprints + gap candidates, quality-weighted
# proximity, composite recovery_value. Zero API calls.
#
# Writes the three Checkpoint-1 diagnostic files and uploads them as
# an artifact for review:
#   recovery_grid_report.md
#   recovery_fuzzy_samples.md
#   recovery_top_candidates.md
#
# Prerequisite: db/migrations/0010_quarantine_recovery.sql applied.
#
# Required secrets:
#   SUPABASE_DB_URL  - Supabase connection string

on:
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install runtime deps
        run: uv sync --frozen

      - name: Run recovery scoring batch
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: uv run scripts/recovery_score.py

      - name: Upload Checkpoint 1 diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: recovery-checkpoint-1
          path: |
            scripts/recovery_grid_report.md
            scripts/recovery_fuzzy_samples.md
            scripts/recovery_top_candidates.md
          if-no-files-found: error
          retention-days: 30
