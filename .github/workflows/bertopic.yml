name: BERTopic diagnostic

# One-off diagnostic — runs the BERTopic comparison against the
# Herald corpus and uploads the Markdown output as a workflow
# artifact you can download from the Actions UI.
#
# Required secrets:
#   SUPABASE_DB_URL  - Supabase connection string (read-only would be fine)

on:
  workflow_dispatch:

jobs:
  bertopic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install runtime + analysis deps
        run: uv sync --group analysis

      - name: Run BERTopic diagnostic
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: uv run scripts/bertopic_diagnostic.py

      - name: Upload Markdown report
        uses: actions/upload-artifact@v4
        with:
          name: bertopic-output
          path: scripts/bertopic_output_*.md
          if-no-files-found: error
          retention-days: 30
