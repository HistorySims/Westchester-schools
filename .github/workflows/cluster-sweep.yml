name: cluster-sweep

# Grid-search the clustering knobs before committing to a topic map: for each
# cluster_dims, reduce once and re-run HDBSCAN across every min_cluster_size,
# reporting topic count / noise % / DBCV (density-based cluster validity). Use
# it to pick a base granularity — then feed those into the `cluster` workflow.
#
#   Actions -> cluster-sweep -> Run workflow
#
# Required secrets: SUPABASE_DB_URL, and VOYAGE_API_KEY (for --embeddings content).

on:
  workflow_dispatch:
    inputs:
      sample:
        description: "Sweep on this many random chunks (relative ranking holds; faster)"
        type: string
        default: "8000"
      dims:
        description: "cluster_dims values to try (comma-separated)"
        type: string
        default: "5,10,15,20"
      min_cluster_sizes:
        description: "HDBSCAN min_cluster_size values to try (comma-separated)"
        type: string
        default: "15,30,60,100"
      min_samples:
        description: "HDBSCAN min_samples (held fixed across the grid)"
        type: string
        default: "5"
      embeddings:
        description: "content = re-embed content-only (topic map); stored = district-prefixed vectors"
        type: choice
        options: ["content", "stored"]
        default: "content"

concurrency:
  group: cluster-sweep
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync deps
        run: uv sync --frozen
      - name: Sanity-check secrets
        run: |
          [ -n "$SUPABASE_DB_URL" ] || { echo "SUPABASE_DB_URL secret is missing"; exit 1; }
      - name: Sweep
        run: |
          uv run herald-cluster sweep \
            --out cluster-sweep.md \
            --sample "${{ inputs.sample }}" \
            --dims "${{ inputs.dims }}" \
            --min-cluster-sizes "${{ inputs.min_cluster_sizes }}" \
            --min-samples "${{ inputs.min_samples }}" \
            --embeddings "${{ inputs.embeddings }}"
      - name: Print the sweep table to the run summary
        if: always()
        run: |
          if [ -f cluster-sweep.md ]; then
            cat cluster-sweep.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload sweep table
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-sweep
          path: cluster-sweep.md
          if-no-files-found: warn
          retention-days: 14
