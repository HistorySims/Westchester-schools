name: ingest

# Ingest scraped school documents into the corpus database:
# manifest -> PDF text -> structural chunks -> Voyage embeddings -> Postgres.
#
# Point it at a finished scrape-all / crawl-sites run: pass that run's id
# (the number in its URL) and this job downloads its artifacts, finds every
# manifest.jsonl, and ingests the documents they record. Re-runs are cheap:
# already-ingested documents (by content hash) are skipped.
#
#   Actions -> ingest -> Run workflow
#
# Required secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_DB_URL  - Supabase session-mode pooler connection string
#   VOYAGE_API_KEY   - Voyage AI key (voyage-3.5)
# Neither is needed for a dry run.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Actions run id of the scrape/crawl run whose artifacts to ingest"
        required: true
        type: string
      district:
        description: "Only this district slug (empty = all)"
        required: false
        type: string
        default: ""
      limit:
        description: "Stop after N documents (empty = all)"
        required: false
        type: string
        default: ""
      init_db:
        description: "Apply the schema first (safe to re-run; needed once on a fresh DB)"
        type: boolean
        default: false
      dry_run:
        description: "Extract + chunk + report only; no DB writes, no Voyage"
        type: boolean
        default: true

concurrency:
  group: ingest
  cancel-in-progress: false

permissions:
  contents: read
  actions: read   # download artifacts from another run

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync deps
        run: uv sync --frozen
      - name: Sanity-check secrets (real run only)
        if: ${{ !inputs.dry_run }}
        run: |
          [ -n "$SUPABASE_DB_URL" ] || { echo "SUPABASE_DB_URL secret is missing"; exit 1; }
          [ -n "$VOYAGE_API_KEY" ]  || { echo "VOYAGE_API_KEY secret is missing"; exit 1; }
          echo "secrets present (lengths only): db=${#SUPABASE_DB_URL} voyage=${#VOYAGE_API_KEY}"
      - name: Download scrape artifacts (run ${{ inputs.run_id }})
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: data/artifacts
      - name: Apply schema
        if: ${{ inputs.init_db && !inputs.dry_run }}
        run: uv run herald-ingest init-db
      - name: Ingest
        run: |
          uv run herald-ingest run \
            --root data/artifacts \
            ${{ inputs.district && format('--district "{0}"', inputs.district) || '' }} \
            ${{ inputs.limit && format('--limit "{0}"', inputs.limit) || '' }} \
            --report ingest-report.md \
            ${{ inputs.dry_run && '--dry-run' || '--no-dry-run' }}
      - name: Publish report to run summary
        if: always()
        run: cat ingest-report.md >> "$GITHUB_STEP_SUMMARY" || echo "(no report)" >> "$GITHUB_STEP_SUMMARY"
