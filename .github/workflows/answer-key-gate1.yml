name: Answer key Gate 1 (American Stories)

# GATE 1 of the recovery-heuristic optimization plan: confirm whether
# Harvard's American Stories dataset (clean, layout-aware OCR of
# Chronicling America pages) covers our two papers in 1845. Downloads
# ONLY the 1845 subset. Read-only against our database (denominator
# counts for Gate-2 sizing). Uploads answer_key_check.md for review.
#
# GO/NO-GO is decided by the human at the gate — this workflow only
# produces the report.
#
# Required secrets:
#   SUPABASE_DB_URL  - Supabase connection string (optional context;
#                      the HF check runs even without it)

on:
  workflow_dispatch:

jobs:
  gate1:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install runtime deps
        run: uv sync --frozen

      - name: Run Gate 1 check
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          HF_HUB_DISABLE_TELEMETRY: "1"
        # datasets<3 because American Stories uses an HF loading
        # script (removed in datasets 3.x). --with keeps it out of
        # the project lockfile — this is throwaway analysis tooling.
        run: uv run --with "datasets<3" python scripts/american_stories_gate1.py

      - name: Upload Gate 1 report
        uses: actions/upload-artifact@v4
        with:
          name: answer-key-gate1
          path: scripts/answer_key_check.md
          if-no-files-found: error
          retention-days: 30
