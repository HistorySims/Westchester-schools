name: Revert cluster_refused quarantine

# Undoes the cluster-refusal corrective for chunks whose individual
# OCR quality is actually OK — they were swept up because Haiku
# refused to label the cluster based on stale rep-chunk samples. Run
# this BEFORE recomputing geometry + relabeling, so Haiku gets a
# clean look at every cluster before we decide which ones are still
# refused.
#
# Each cluster_refused chunk is re-evaluated against the per-chunk
# heuristic using its stored quality_subscores:
#   - Per-chunk heuristic also says bad → stays quarantined under
#     the heuristic's reason ('ocr_illegible' or 'too_short').
#   - Per-chunk heuristic says active → returns to active.
#
# Idempotent. Read-only run available with the dry_run input.
#
# Required secrets:
#   SUPABASE_DB_URL  - Supabase connection string

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report counts only; do not write to the database"
        required: false
        type: boolean
        default: false

jobs:
  revert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install runtime deps
        run: uv sync --frozen

      - name: Revert cluster_refused (per-chunk-aware)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Bash string comparison is case-sensitive and GitHub passes
          # boolean inputs as "true"/"false" (proper boolean type) or
          # "True"/"False" (string fallback). Normalize before testing.
          DRY=$(printf '%s' "${{ inputs.dry_run }}" | tr '[:upper:]' '[:lower:]')
          if [ "$DRY" = "true" ]; then
            uv run scripts/revert_cluster_refused.py --dry-run
          else
            uv run scripts/revert_cluster_refused.py
          fi
