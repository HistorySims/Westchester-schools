name: Recovery tuning (Phase 3)

# Phase 3 of the recovery-heuristic optimization plan, gated on human
# approval of the Gate 2 baseline (given). Tunes the theme-scoped
# scoring heuristic against the FROZEN eval set committed at
# data/recovery_eval/ — the exact labels reviewed at Gate 2.
#
# Zero API calls: no HuggingFace download, no Anthropic, no Voyage.
# Read-only against the database (gazetteer / matches / centroids /
# embeddings). The tuned configuration is written to
# tuning_results.md for review — it is NOT applied to the live
# pipeline.
#
# Required secrets:
#   SUPABASE_DB_URL  - Supabase connection string

on:
  workflow_dispatch:

jobs:
  tune:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install runtime deps
        run: uv sync --frozen

      - name: Run tuning loop
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: uv run python scripts/recovery_tuning.py

      - name: Upload tuning log + results
        uses: actions/upload-artifact@v4
        with:
          name: recovery-tuning
          path: |
            scripts/tuning_log.md
            scripts/tuning_results.md
          if-no-files-found: error
          retention-days: 30
